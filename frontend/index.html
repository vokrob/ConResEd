<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConResEd</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ConResEd</h1>
            <p class="subtitle">Конвертер и редактор резюме </p>
        </header>

        <div id="status-message" class="status-message"></div>

        <section class="demo-section">
            <h2>Тест БД</h2>
            <button id="hello-btn" class="btn">Получить Hello World из БД</button>
            <div id="hello-result" class="result-box"></div>
        </section>

        <section class="demo-section">
            <h2>Регистрация</h2>
            <form id="register-form" class="form-grid">
                <label for="full-name">ФИО</label>
                <input id="full-name" name="full-name" type="text" required minlength="2" />

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />

                <label for="password">Пароль</label>
                <input id="password" name="password" type="password" required minlength="8" />

                <button id="register-btn" type="submit" class="btn btn-success">Зарегистрироваться</button>
            </form>
            <div id="register-result" class="result-box"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
