<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резюме</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Calibri', 'Arial', sans-serif;
            background: #e8e8e8;
            min-height: 100vh;
            padding: 30px 20px;
            line-height: 1.5;
        }

        .resume-container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .top-bar {
            background: #1e3a5f;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .contact-info {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .contact-icon {
            font-size: 14px;
        }

        .header {
            padding: 40px 50px;
            background: #f8f9fa;
            border-bottom: 3px solid #1e3a5f;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .avatar-placeholder {
            width: 120px;
            height: 150px;
            background: #e8f0f8;
            border: 2px dashed #1e3a5f;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-block {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex: 1;
        }

        .name {
            font-size: 44px;
            font-weight: 700;
            color: #1e3a5f;
            letter-spacing: 1px;
        }

        .credentials {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .target-position {
            text-align: right;
        }

        .target-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 5px;
        }

        .target-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e3a5f;
        }

        .content {
            padding: 40px 50px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 50px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #1e3a5f;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1e3a5f;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            width: 24px;
            height: 24px;
            background: #1e3a5f;
            color: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .editable-field {
            min-height: 20px;
            padding: 6px 8px;
            border: 1px dashed transparent;
            border-radius: 3px;
            transition: all 0.2s;
            color: #333;
        }

        .editable-field:hover {
            border-color: #1e3a5f;
            background: #f0f4f8;
        }

        .editable-field:focus {
            outline: none;
            border-color: #2c5282;
            background: #fff;
        }

        .editable-field:empty:before {
            content: attr(data-placeholder);
            color: #999;
            font-style: italic;
        }

        .summary-box {
            background: #f8f9fa;
            padding: 20px;
            border-left: 4px solid #1e3a5f;
            font-size: 14px;
            line-height: 1.7;
        }

        .experience-item {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .experience-item:last-child {
            border-bottom: none;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .item-title {
            font-weight: 700;
            color: #1e3a5f;
            font-size: 16px;
        }

        .item-date {
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }

        .item-company {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .item-location {
            color: #888;
            font-size: 12px;
        }

        .item-description {
            color: #444;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .achievements-list {
            list-style: none;
            padding-left: 0;
        }

        .achievements-list li {
            position: relative;
            padding-left: 18px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #555;
        }

        .achievements-list li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: #1e3a5f;
            font-weight: bold;
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1e3a5f;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e3a5f;
        }

        .skills-category {
            margin-bottom: 20px;
        }

        .skills-category-title {
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .skill-tag {
            background: #e8f0f8;
            color: #1e3a5f;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
        }

        .cert-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dotted #ddd;
        }

        .cert-item:last-child {
            border-bottom: none;
        }

        .cert-name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .cert-org {
            color: #666;
            font-size: 12px;
        }

        .cert-date {
            color: #888;
            font-size: 11px;
        }

        .language-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dotted #ddd;
        }

        .language-name {
            font-weight: 500;
            color: #333;
            font-size: 13px;
        }

        .language-level {
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .header {
                padding: 25px;
            }
            .content {
                padding: 25px;
            }
            .top-bar {
                padding: 15px 25px;
            }
            .name-block {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .target-position {
                text-align: left;
            }
            .name {
                font-size: 32px;
            }
        }

        .experience-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-add, .btn-remove {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add {
            background: #1e3a5f;
            color: white;
        }

        .btn-add:hover {
            background: #2c5282;
        }

        .btn-remove {
            background: #e8f0f8;
            color: #1e3a5f;
            border: 1px solid #1e3a5f;
        }

        .btn-remove:hover {
            background: #1e3a5f;
            color: white;
        }

        .btn-remove:disabled {
            background: #f0f0f0;
            color: #999;
            border-color: #ccc;
            cursor: not-allowed;
        }

        .skill-mini-controls {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }

        .btn-mini {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 3px;
            background: #1e3a5f;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }

        .btn-mini:hover {
            background: #2c5282;
        }

        .btn-mini-remove {
            background: #e8f0f8;
            color: #1e3a5f;
            border: 1px solid #1e3a5f;
        }

        .btn-mini-remove:hover {
            background: #1e3a5f;
            color: white;
        }

        .template-nav {
            max-width: 850px;
            margin: 0 auto 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .template-nav a {
            text-decoration: none;
            background: #1e3a5f;
            color: #fff;
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 5px;
        }

        .template-nav button {
            border: none;
            background: #c0392b;
            color: #fff;
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .resume-container {
                box-shadow: none;
            }
            .editable-field {
                border: none;
            }
            .experience-controls, .skill-mini-controls {
                display: none;
            }
        }

        body {
            background: #fff;
            padding: 16px;
        }

        .resume-container {
            max-width: 210mm;
            min-height: 297mm;
            box-shadow: none;
        }

        .template-nav {
            max-width: 210mm;
        }

        .editable-field {
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .fio-field {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .section, .sidebar-section, .experience-item, .skills-category, .cert-item, .language-item {
            break-inside: avoid-page;
            page-break-inside: avoid;
        }
        .print-priority-high { break-inside: avoid-page; page-break-inside: avoid; }
        .print-priority-medium { break-inside: avoid-page; page-break-inside: avoid; }
        .print-priority-low { break-inside: auto; page-break-inside: auto; }

        .item-remove-btn {
            margin-top: 8px;
            border: none;
            background: #f3f4f6;
            color: #7f1d1d;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        @page {
            size: A4;
            margin: 10mm;
        }

        @media print {
            .template-nav, .experience-controls, .skill-mini-controls, .item-remove-btn {
                display: none !important;
            }

            .resume-container {
                width: 190mm;
                min-height: auto;
                padding: 0;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <nav class="template-nav">
        <a href="http://localhost:8080/">Главная</a>
        <a href="http://localhost:8080/templates/classic.html">Классический</a>
        <a href="http://localhost:8080/templates/modern.html">Современный</a>
        <a href="http://localhost:8080/templates/creative.html">Креативный</a>
        <a href="http://localhost:8080/templates/professional.html">Профессиональный</a>
        <button type="button" onclick="saveToCabinet()" style="background:#166534;">Сохранить в кабинет</button>
        <button type="button" onclick="exportToPdf()" style="background:#1d4ed8;">Скачать PDF (A4)</button>
        <button type="button" onclick="clearAllFields()">Очистить все поля</button>
    </nav>
    <div class="resume-container">
        <div class="top-bar print-priority-high">
            <div class="contact-info">
                <div class="contact-item">
                    <span class="contact-icon">✉</span>
                    <span class="editable-field" data-placeholder="Email" contenteditable="true"></span>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">☎</span>
                    <span class="editable-field" data-placeholder="Телефон" contenteditable="true"></span>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">hh</span>
                    <span class="editable-field" data-placeholder="hh.ru" contenteditable="true"></span>
                </div>
            </div>
            <div class="contact-item">
                <span class="contact-icon">⌖</span>
                <span class="editable-field" data-placeholder="Город" contenteditable="true"></span>
            </div>
        </div>

        <header class="header print-priority-high">
            <div class="avatar-placeholder">📷 Фото</div>
            <div class="name-block">
                <div>
                    <div class="name">
                        <span class="editable-field" data-placeholder="Фамилия" contenteditable="true"></span>
                        <span class="editable-field" data-placeholder="Имя" contenteditable="true"></span>
                        <span class="editable-field" data-placeholder="Отчество" contenteditable="true"></span>
                    </div>
                    <div class="credentials editable-field" data-placeholder="Сертификаты" contenteditable="true"></div>
                </div>
                <div class="target-position">
                    <div class="target-label">Целевая позиция</div>
                    <div class="target-title editable-field" data-placeholder="Должность" contenteditable="true"></div>
                </div>
            </div>
        </header>

        <div class="content">
            <div class="main-grid">
                <div class="main-column">
                    <div class="section print-priority-high">
                        <h2 class="section-title">
                            <span class="section-icon">◆</span>
                            О себе
                        </h2>
                        <div class="summary-box">
                            <div class="editable-field" data-placeholder="Краткое описание вашего профессионального опыта" contenteditable="true"></div>
                        </div>
                    </div>

                    <div class="section print-priority-medium">
                        <h2 class="section-title">
                            <span class="section-icon">◆</span>
                            Опыт работы
                        </h2>
                        <div id="experience-container">
                            <div class="experience-item">
                                <div class="item-header">
                                    <span class="item-title editable-field" data-placeholder="Должность" contenteditable="true"></span>
                                    <span class="item-date editable-field" data-placeholder="Период" contenteditable="true"></span>
                                </div>
                                <div class="item-company">
                                    <span class="editable-field" data-placeholder="Компания" contenteditable="true"></span>
                                    <span class="item-location editable-field" data-placeholder=" | Город" contenteditable="true"></span>
                                </div>
                                <div class="item-description editable-field" data-placeholder="Описание обязанностей" contenteditable="true"></div>
                                <ul class="achievements-list">
                                    <li class="editable-field" data-placeholder="Достижение" contenteditable="true"></li>
                                </ul>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addExperience()">+ Добавить место работы</button>
                            <button class="btn-remove" id="btn-remove-experience" onclick="removeExperience()" disabled>- Удалить последнее</button>
                        </div>
                    </div>

                    <div class="section print-priority-medium">
                        <h2 class="section-title">
                            <span class="section-icon">◆</span>
                            Образование
                        </h2>
                        <div id="education-container">
                            <div class="experience-item">
                                <div class="item-header">
                                    <span class="item-title editable-field" data-placeholder="Степень" contenteditable="true"></span>
                                    <span class="item-date editable-field" data-placeholder="Год" contenteditable="true"></span>
                                </div>
                                <div class="item-company editable-field" data-placeholder="Учебное заведение" contenteditable="true"></div>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addEducation()">+ Добавить образование</button>
                            <button class="btn-remove" id="btn-remove-education" onclick="removeEducation()" disabled>- Удалить последнее</button>
                        </div>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="sidebar-section print-priority-medium">
                        <h3 class="sidebar-title">Компетенции</h3>
                        <div id="skills-container">
                            <div class="skills-category" data-category-id="1">
                                <div class="skills-category-title editable-field" data-placeholder="Категория" contenteditable="true"></div>
                                <div class="skills-list" id="skills-list-1">
                                    <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                                    <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                                </div>
                                <div class="skill-mini-controls">
                                    <button class="btn-mini" onclick="addSkillToCategory(1)" title="Добавить навык">+</button>
                                    <button class="btn-mini btn-mini-remove" onclick="removeSkillFromCategory(1)" title="Удалить навык">-</button>
                                </div>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addSkillCategory()">+ Добавить категорию</button>
                            <button class="btn-remove" id="btn-remove-skill" onclick="removeSkillCategory()" disabled>- Удалить последнюю</button>
                        </div>
                    </div>

                    <div class="sidebar-section print-priority-low">
                        <h3 class="sidebar-title">Сертификаты</h3>
                        <div id="certificates-container">
                            <div class="cert-item">
                                <div class="cert-name editable-field" data-placeholder="Название" contenteditable="true"></div>
                                <div class="cert-org editable-field" data-placeholder="Организация" contenteditable="true"></div>
                                <div class="cert-date editable-field" data-placeholder="Год" contenteditable="true"></div>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addCertificate()">+ Добавить сертификат</button>
                            <button class="btn-remove" id="btn-remove-certificate" onclick="removeCertificate()" disabled>- Удалить последний</button>
                        </div>
                    </div>

                    <div class="sidebar-section print-priority-low">
                        <h3 class="sidebar-title">Языки</h3>
                        <div id="languages-container">
                            <div class="language-item">
                                <span class="language-name editable-field" data-placeholder="Язык" contenteditable="true"></span>
                                <span class="language-level editable-field" data-placeholder="Уровень" contenteditable="true"></span>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addLanguage()">+ Добавить язык</button>
                            <button class="btn-remove" id="btn-remove-language" onclick="removeLanguage()" disabled>- Удалить последний</button>
                        </div>
                    </div>

                    <div class="sidebar-section print-priority-low">
                        <h3 class="sidebar-title">Дополнительно</h3>
                        <div class="editable-field" data-placeholder="По запросу" contenteditable="true" style="font-size: 13px; color: #666;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Функция для очистки пустых полей при потере фокуса
        document.querySelectorAll('.editable-field').forEach(field => {
            field.addEventListener('blur', function() {
                const text = this.innerText.trim();
                if (text === '') {
                    this.innerHTML = '';
                }
            });
        });

        // Опыт работы
        function addExperience() {
            const container = document.getElementById('experience-container');
            const newItem = document.createElement('div');
            newItem.className = 'experience-item';
            newItem.innerHTML = `
                <div class="item-header">
                    <span class="item-title editable-field" data-placeholder="Должность" contenteditable="true"></span>
                    <span class="item-date editable-field" data-placeholder="Период" contenteditable="true"></span>
                </div>
                <div class="item-company">
                    <span class="editable-field" data-placeholder="Компания" contenteditable="true"></span>
                    <span class="item-location editable-field" data-placeholder=" | Город" contenteditable="true"></span>
                </div>
                <div class="item-description editable-field" data-placeholder="Описание обязанностей" contenteditable="true"></div>
                <ul class="achievements-list">
                    <li class="editable-field" data-placeholder="Достижение" contenteditable="true"></li>
                </ul>
            `;
            container.appendChild(newItem);
            updateRemoveButton('experience');
            attachBlurHandler(newItem);
        }

        function removeExperience() {
            const container = document.getElementById('experience-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateRemoveButton('experience');
            saveStructure();
        }

        // Образование
        function addEducation() {
            const container = document.getElementById('education-container');
            const newItem = document.createElement('div');
            newItem.className = 'experience-item';
            newItem.innerHTML = `
                <div class="item-header">
                    <span class="item-title editable-field" data-placeholder="Степень" contenteditable="true"></span>
                    <span class="item-date editable-field" data-placeholder="Год" contenteditable="true"></span>
                </div>
                <div class="item-company editable-field" data-placeholder="Учебное заведение" contenteditable="true"></div>
            `;
            container.appendChild(newItem);
            updateRemoveButton('education');
            attachBlurHandler(newItem);
        }

        function removeEducation() {
            const container = document.getElementById('education-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateRemoveButton('education');
            saveStructure();
        }

        // Счетчик для ID категорий навыков
        let skillCategoryIdCounter = 1;

        // Категории навыков
        function addSkillCategory() {
            skillCategoryIdCounter++;
            const container = document.getElementById('skills-container');
            const newItem = document.createElement('div');
            newItem.className = 'skills-category';
            newItem.setAttribute('data-category-id', skillCategoryIdCounter);
            newItem.innerHTML = `
                <div class="skills-category-title editable-field" data-placeholder="Категория" contenteditable="true"></div>
                <div class="skills-list" id="skills-list-${skillCategoryIdCounter}">
                    <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                    <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                </div>
                <div class="skill-mini-controls">
                    <button class="btn-mini" onclick="addSkillToCategory(${skillCategoryIdCounter})" title="Добавить навык">+</button>
                    <button class="btn-mini btn-mini-remove" onclick="removeSkillFromCategory(${skillCategoryIdCounter})" title="Удалить навык">-</button>
                </div>
            `;
            container.appendChild(newItem);
            updateSkillRemoveButton();
            attachBlurHandler(newItem);
        }

        function removeSkillCategory() {
            const container = document.getElementById('skills-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateSkillRemoveButton();
        }

        function updateSkillRemoveButton() {
            const container = document.getElementById('skills-container');
            const btn = document.getElementById('btn-remove-skill');
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        // Добавить навык в конкретную категорию
        function addSkillToCategory(categoryId) {
            const skillsList = document.getElementById('skills-list-' + categoryId);
            if (skillsList) {
                const newSkill = document.createElement('span');
                newSkill.className = 'skill-tag editable-field';
                newSkill.setAttribute('data-placeholder', 'Навык');
                newSkill.setAttribute('contenteditable', 'true');
                skillsList.appendChild(newSkill);
                // Attach blur handler
                newSkill.addEventListener('blur', function() {
                    const text = this.innerText.trim();
                    if (text === '') {
                        this.innerHTML = '';
                    }
                });
            }
        }

        // Удалить последний навык из категории
        function removeSkillFromCategory(categoryId) {
            const skillsList = document.getElementById('skills-list-' + categoryId);
            if (skillsList && skillsList.children.length > 0) {
                skillsList.removeChild(skillsList.lastElementChild);
            }
        }

        // Сертификаты
        function addCertificate() {
            const container = document.getElementById('certificates-container');
            const newItem = document.createElement('div');
            newItem.className = 'cert-item';
            newItem.innerHTML = `
                <div class="cert-name editable-field" data-placeholder="Название" contenteditable="true"></div>
                <div class="cert-org editable-field" data-placeholder="Организация" contenteditable="true"></div>
                <div class="cert-date editable-field" data-placeholder="Год" contenteditable="true"></div>
            `;
            container.appendChild(newItem);
            updateCertificateRemoveButton();
            attachBlurHandler(newItem);
        }

        function removeCertificate() {
            const container = document.getElementById('certificates-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateCertificateRemoveButton();
        }

        function updateCertificateRemoveButton() {
            const container = document.getElementById('certificates-container');
            const btn = document.getElementById('btn-remove-certificate');
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        // Языки
        function addLanguage() {
            const container = document.getElementById('languages-container');
            const newItem = document.createElement('div');
            newItem.className = 'language-item';
            newItem.innerHTML = `
                <span class="language-name editable-field" data-placeholder="Язык" contenteditable="true"></span>
                <span class="language-level editable-field" data-placeholder="Уровень" contenteditable="true"></span>
            `;
            container.appendChild(newItem);
            updateLanguageRemoveButton();
            attachBlurHandler(newItem);
        }

        function removeLanguage() {
            const container = document.getElementById('languages-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateLanguageRemoveButton();
        }

        function updateLanguageRemoveButton() {
            const container = document.getElementById('languages-container');
            const btn = document.getElementById('btn-remove-language');
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        function updateRemoveButton(type) {
            const container = document.getElementById(type + '-container');
            const btn = document.getElementById('btn-remove-' + type);
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        function attachBlurHandler(element) {
            element.querySelectorAll('.editable-field').forEach(field => {
                field.addEventListener('blur', function() {
                    const text = this.innerText.trim();
                    if (text === '') {
                        this.innerHTML = '';
                    }
                });
            });
        }

        // Initialize all remove buttons
        updateSkillRemoveButton();
        updateCertificateRemoveButton();
        updateLanguageRemoveButton();

        const STORAGE_KEY = 'resume-shared-fields-v1';

        function normalizePlaceholder(value) {
            const source = (value || '').trim().toLowerCase();
            const map = {
                'фамилия': 'last_name',
                'имя': 'first_name',
                'отчество': 'middle_name',
                'должность': 'position',
                'email': 'email',
                'телефон': 'phone',
                'город': 'city',
                'локация': 'city',
                'о себе': 'about',
                'краткое описание вашего профессионального опыта': 'about',
                'компания': 'company',
                'название компании': 'company',
                'период': 'period',
                'период работы': 'period',
                'описание': 'description',
                'описание обязанностей': 'description',
                'степень': 'education_degree',
                'степень / специальность': 'education_degree',
                'год': 'education_year',
                'год окончания': 'education_year',
                'учебное заведение': 'education_place',
                'по запросу': 'additional',
            };
            return map[source] || source;
        }

        function resolveGroup(field) {
            if (field.closest('#experience-container')) return 'experience';
            if (field.closest('#education-container')) return 'education';
            return 'general';
        }

        function buildFieldKey(field) {
            const group = resolveGroup(field);
            const normalized = normalizePlaceholder(field.getAttribute('data-placeholder') || 'field');
            const same = Array.from(document.querySelectorAll('.editable-field')).filter((item) => {
                return resolveGroup(item) === group && normalizePlaceholder(item.getAttribute('data-placeholder') || 'field') === normalized;
            });
            return `${group}::${normalized}::${same.indexOf(field)}`;
        }

        function saveFields() {
            const data = {};
            document.querySelectorAll('.editable-field').forEach(field => {
                const value = field.innerText.trim();
                if (value) {
                    data[buildFieldKey(field)] = value;
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function restoreFields() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            let data = {};
            try {
                data = JSON.parse(raw);
            } catch {
                return;
            }
            document.querySelectorAll('.editable-field').forEach(field => {
                const value = data[buildFieldKey(field)];
                if (typeof value === 'string' && value.length > 0) {
                    field.innerText = value;
                }
            });
        }

        document.addEventListener('input', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                saveFields();
            }
        });
        document.addEventListener('blur', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                saveFields();
            }
        }, true);

        function clearAllFields() {
            document.querySelectorAll('.editable-field').forEach((field) => {
                field.innerHTML = '';
            });
            localStorage.removeItem(STORAGE_KEY);
        }

        function exportToPdf() {
            window.print();
        }

        async function saveToCabinet() {
            const params = new URLSearchParams(window.location.search);
            const resumeId = params.get('resumeId');
            const updateExisting = resumeId ? window.confirm('Обновить текущее сохраненное резюме?\nНажмите Отмена, чтобы сохранить как новое.') : false;
            const title = window.prompt('Название шаблона', 'Мое резюме (professional)') || '';
            if (!title.trim()) return;
            saveFields();
            saveStructure();
            const payload = {
                fields: JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'),
                structure: JSON.parse(localStorage.getItem(STRUCTURE_STORAGE_KEY) || '{}')
            };
            const url = updateExisting ? `/api/resumes/${resumeId}` : '/api/resumes';
            const method = updateExisting ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ template_id: 'professional', title, payload })
            });
            const result = await response.json().catch(() => ({}));
            if (response.ok) {
                if (!updateExisting && result?.item?.id) {
                    params.set('resumeId', String(result.item.id));
                    window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
                }
                alert(updateExisting ? 'Изменения сохранены' : 'Шаблон сохранен в личный кабинет');
            } else {
                alert(result?.error || 'Не удалось сохранить шаблон');
            }
        }

        function applyInputConstraints() {
            document.querySelectorAll('.editable-field').forEach((field) => {
                const ph = (field.getAttribute('data-placeholder') || '').toLowerCase();
                if (['фамилия', 'имя', 'отчество'].includes(ph)) {
                    field.classList.add('fio-field');
                    field.dataset.singleLine = 'true';
                    field.dataset.maxLine = '30';
                    return;
                }
                if (!field.dataset.maxLine) {
                    field.dataset.maxLine = ph.includes('навык') ? '160' : '80';
                }
            });
        }

        function clampContent(field) {
            const singleLine = field.dataset.singleLine === 'true';
            const maxLine = parseInt(field.dataset.maxLine || '80', 10);
            let value = (field.innerText || '').replace(/\u00A0/g, ' ');
            if (singleLine) {
                value = value.replace(/[\r\n]+/g, ' ');
                const normalized = value.slice(0, maxLine);
                if (normalized !== field.innerText) field.innerText = normalized;
                return;
            }
            if (!/[\r\n]/.test(value)) {
                return;
            }
            const lines = value.split(/\r?\n/).map((line) => line.slice(0, maxLine));
            const normalized = lines.join('\n');
            if (normalized !== field.innerText) field.innerText = normalized;
        }

        function getItemSelector(container) {
            const first = container && container.firstElementChild;
            if (!first) return null;
            return '.' + Array.from(first.classList)[0];
        }

        function ensureItemRemoveButtons() {
            ['experience-container', 'education-container'].forEach((id) => {
                const container = document.getElementById(id);
                if (!container) return;
                const itemSelector = getItemSelector(container);
                if (!itemSelector) return;
                container.querySelectorAll(itemSelector).forEach((item) => {
                    if (item.querySelector('.item-remove-btn')) return;
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'item-remove-btn';
                    btn.textContent = 'Удалить этот блок';
                    btn.onclick = () => {
                        if (container.querySelectorAll(itemSelector).length > 1) {
                            item.remove();
                            saveFields();
                            saveStructure();
                        }
                    };
                    item.appendChild(btn);
                });
            });
        }

        const STRUCTURE_STORAGE_KEY = 'resume-shared-structure-v1';
        const originalAddExperience = addExperience;
        addExperience = function() { originalAddExperience(); ensureItemRemoveButtons(); saveStructure(); };
        const originalAddEducation = addEducation;
        addEducation = function() { originalAddEducation(); ensureItemRemoveButtons(); saveStructure(); };

        function saveStructure() {
            localStorage.setItem(STRUCTURE_STORAGE_KEY, JSON.stringify({
                experience: document.getElementById('experience-container')?.children.length || 1,
                education: document.getElementById('education-container')?.children.length || 1,
            }));
        }

        function restoreStructure() {
            const raw = localStorage.getItem(STRUCTURE_STORAGE_KEY);
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                while ((document.getElementById('experience-container')?.children.length || 0) < Math.max(1, Number(data.experience) || 1)) addExperience();
                while ((document.getElementById('education-container')?.children.length || 0) < Math.max(1, Number(data.education) || 1)) addEducation();
            } catch {}
        }

        document.addEventListener('input', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                clampContent(event.target);
                saveFields();
                saveStructure();
            }
        });

        async function initPageData() {
            const params = new URLSearchParams(window.location.search);
            const resumeId = params.get('resumeId');
            const blank = params.get('blank') === '1';

            if (resumeId) {
                try {
                    const response = await fetch(`/api/resumes/${resumeId}`, { credentials: 'include' });
                    if (response.ok) {
                        const data = await response.json();
                        const payload = data?.item?.payload || {};
                        if (payload.structure) {
                            localStorage.setItem(STRUCTURE_STORAGE_KEY, JSON.stringify(payload.structure));
                        }
                        if (payload.fields) {
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload.fields));
                        }
                    }
                } catch {}
                restoreStructure();
                restoreFields();
                return;
            }

            if (blank) {
                return;
            }

            restoreStructure();
            restoreFields();
        }

        applyInputConstraints();
        ensureItemRemoveButtons();
        initPageData();
    </script>
</body>
