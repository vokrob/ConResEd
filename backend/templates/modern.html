<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резюме</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .resume-container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .top-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px;
            text-align: center;
        }

        .avatar-placeholder {
            width: 140px;
            height: 180px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            overflow: hidden;
            position: relative;
        }

        .avatar-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder .upload-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            opacity: 0.8;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .name {
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .name .bold {
            font-weight: 700;
        }

        .title {
            font-size: 20px;
            opacity: 0.9;
            font-weight: 300;
        }

        .content {
            padding: 50px;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .editable-field {
            min-height: 20px;
            padding: 8px;
            border: 1px dashed transparent;
            border-radius: 6px;
            transition: all 0.2s;
            color: #444;
        }

        .editable-field:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .editable-field:focus {
            outline: none;
            border-color: #764ba2;
            background: #fff;
        }

        .editable-field:empty:before {
            content: attr(data-placeholder);
            color: #bbb;
        }

        .contact-grid {
            display: grid;
            gap: 12px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #555;
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .experience-item {
            margin-bottom: 25px;
            padding-left: 20px;
            border-left: 3px solid #667eea;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .item-date {
            color: #667eea;
            font-size: 13px;
            font-weight: 500;
            background: #f0f0ff;
            padding: 3px 10px;
            border-radius: 15px;
        }

        .item-company {
            color: #777;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .item-description {
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 500;
        }

        .skill-tag.editable-field:empty:before {
            color: rgba(255,255,255,0.7);
        }

        .skill-tag.editable-field:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
            border-color: rgba(255,255,255,0.5);
        }

        .skill-tag.editable-field:focus {
            background: #fff;
            color: #333;
            border-color: #764ba2;
        }

        .skill-tag.editable-field:focus:empty:before {
            color: #999;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 4px;
        }

        .language-item {
            margin-bottom: 15px;
        }

        .language-name {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .summary-box {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }

        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .content {
                padding: 30px;
            }
            .top-section {
                padding: 30px;
            }
            .name {
                font-size: 32px;
            }
        }

        .experience-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-add, .btn-remove {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-add:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-remove {
            background: #e74c3c;
            color: white;
        }

        .btn-remove:hover {
            background: #c0392b;
        }

        .btn-remove:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .template-nav {
            max-width: 850px;
            margin: 0 auto 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .template-nav a {
            text-decoration: none;
            background: #4d5fd0;
            color: #fff;
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 5px;
        }

        .template-nav button {
            border: none;
            background: #c0392b;
            color: #fff;
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .resume-container {
                box-shadow: none;
                border-radius: 0;
            }
            .editable-field {
                border: none;
            }
            .experience-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav class="template-nav">
        <a href="http://localhost:8080/">Главная</a>
        <a href="http://localhost:8080/templates/classic.html">Классический</a>
        <a href="http://localhost:8080/templates/modern.html">Современный</a>
        <a href="http://localhost:8080/templates/creative.html">Креативный</a>
        <a href="http://localhost:8080/templates/professional.html">Профессиональный</a>
        <button type="button" onclick="clearAllFields()">Очистить все поля</button>
    </nav>
    <div class="resume-container">
        <div class="top-section">
            <div class="avatar-placeholder">
                <span>📷</span>
                <span class="upload-hint">Фото</span>
            </div>
            <div class="name">
                <span class="editable-field" data-placeholder="Фамилия" contenteditable="true"></span>
                <span class="editable-field" data-placeholder="Имя" contenteditable="true"></span>
                <span class="editable-field" data-placeholder="Отчество" contenteditable="true"></span>
            </div>
            <div class="title editable-field" data-placeholder="Должность" contenteditable="true"></div>
        </div>

        <div class="content">
            <div class="two-columns">
                <div class="left-column">
                    <div class="section">
                        <h2 class="section-title">О себе</h2>
                        <div class="summary-box">
                            <div class="editable-field" data-placeholder="Расскажите о себе" contenteditable="true"></div>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">Опыт работы</h2>
                        <div id="experience-container">
                            <div class="experience-item">
                                <div class="item-header">
                                    <span class="item-title editable-field" data-placeholder="Должность" contenteditable="true"></span>
                                    <span class="item-date editable-field" data-placeholder="Период" contenteditable="true"></span>
                                </div>
                                <div class="item-company editable-field" data-placeholder="Компания" contenteditable="true"></div>
                                <div class="item-description editable-field" data-placeholder="Описание" contenteditable="true"></div>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addExperience()">+ Добавить место работы</button>
                            <button class="btn-remove" id="btn-remove-experience" onclick="removeExperience()" disabled>- Удалить последнее</button>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">Образование</h2>
                        <div id="education-container">
                            <div class="experience-item">
                                <div class="item-header">
                                    <span class="item-title editable-field" data-placeholder="Степень" contenteditable="true"></span>
                                    <span class="item-date editable-field" data-placeholder="Год" contenteditable="true"></span>
                                </div>
                                <div class="item-company editable-field" data-placeholder="Учебное заведение" contenteditable="true"></div>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addEducation()">+ Добавить образование</button>
                            <button class="btn-remove" id="btn-remove-education" onclick="removeEducation()" disabled>- Удалить последнее</button>
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <div class="section">
                        <h2 class="section-title">Контакты</h2>
                        <div class="contact-grid">
                            <div class="contact-item">
                                <div class="contact-icon">@</div>
                                <div class="editable-field" data-placeholder="Email" contenteditable="true"></div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-icon">📱</div>
                                <div class="editable-field" data-placeholder="Телефон" contenteditable="true"></div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-icon">📍</div>
                                <div class="editable-field" data-placeholder="Город" contenteditable="true"></div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-icon">in</div>
                                <div class="editable-field" data-placeholder="hh.ru" contenteditable="true"></div>
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">Навыки</h2>
                        <div id="skills-container" class="skills-container">
                            <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                            <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                            <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                            <span class="skill-tag editable-field" data-placeholder="Навык" contenteditable="true"></span>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addSkill()">+ Добавить навык</button>
                            <button class="btn-remove" id="btn-remove-skill" onclick="removeSkill()" disabled>- Удалить</button>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">Языки</h2>
                        <div id="languages-container">
                            <div class="language-item">
                                <div class="language-name">
                                    <span class="editable-field" data-placeholder="Язык" contenteditable="true"></span>
                                    <span class="editable-field" data-placeholder="Уровень" contenteditable="true"></span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 100%;"></div>
                                </div>
                            </div>
                        </div>
                        <div class="experience-controls">
                            <button class="btn-add" onclick="addLanguage()">+ Добавить язык</button>
                            <button class="btn-remove" id="btn-remove-language" onclick="removeLanguage()" disabled>- Удалить последний</button>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">Дополнительно</h2>
                        <div class="editable-field" data-placeholder="Ваши интересы" contenteditable="true"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Функция для очистки пустых полей при потере фокуса
        document.querySelectorAll('.editable-field').forEach(field => {
            field.addEventListener('blur', function() {
                const text = this.innerText.trim();
                if (text === '') {
                    this.innerHTML = '';
                }
            });
        });

        // Опыт работы
        function addExperience() {
            const container = document.getElementById('experience-container');
            const newItem = document.createElement('div');
            newItem.className = 'experience-item';
            newItem.innerHTML = `
                <div class="item-header">
                    <span class="item-title editable-field" data-placeholder="Должность" contenteditable="true"></span>
                    <span class="item-date editable-field" data-placeholder="Период" contenteditable="true"></span>
                </div>
                <div class="item-company editable-field" data-placeholder="Компания" contenteditable="true"></div>
                <div class="item-description editable-field" data-placeholder="Описание" contenteditable="true"></div>
            `;
            container.appendChild(newItem);
            updateRemoveButton('experience');
            attachBlurHandler(newItem);
        }

        function removeExperience() {
            const container = document.getElementById('experience-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateRemoveButton('experience');
        }

        // Образование
        function addEducation() {
            const container = document.getElementById('education-container');
            const newItem = document.createElement('div');
            newItem.className = 'experience-item';
            newItem.innerHTML = `
                <div class="item-header">
                    <span class="item-title editable-field" data-placeholder="Степень" contenteditable="true"></span>
                    <span class="item-date editable-field" data-placeholder="Год" contenteditable="true"></span>
                </div>
                <div class="item-company editable-field" data-placeholder="Учебное заведение" contenteditable="true"></div>
            `;
            container.appendChild(newItem);
            updateRemoveButton('education');
            attachBlurHandler(newItem);
        }

        function removeEducation() {
            const container = document.getElementById('education-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateRemoveButton('education');
        }

        // Навыки
        function addSkill() {
            const container = document.getElementById('skills-container');
            const newItem = document.createElement('span');
            newItem.className = 'skill-tag editable-field';
            newItem.setAttribute('data-placeholder', 'Навык');
            newItem.setAttribute('contenteditable', 'true');
            container.appendChild(newItem);
            updateSkillRemoveButton();
            // Attach blur handler directly
            newItem.addEventListener('blur', function() {
                const text = this.innerText.trim();
                if (text === '') {
                    this.innerHTML = '';
                }
            });
        }

        function removeSkill() {
            const container = document.getElementById('skills-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateSkillRemoveButton();
        }

        function updateSkillRemoveButton() {
            const container = document.getElementById('skills-container');
            const btn = document.getElementById('btn-remove-skill');
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        // Языки
        function addLanguage() {
            const container = document.getElementById('languages-container');
            const newItem = document.createElement('div');
            newItem.className = 'language-item';
            newItem.innerHTML = `
                <div class="language-name">
                    <span class="editable-field" data-placeholder="Язык" contenteditable="true"></span>
                    <span class="editable-field" data-placeholder="Уровень" contenteditable="true"></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 100%;"></div>
                </div>
            `;
            container.appendChild(newItem);
            updateLanguageRemoveButton();
            attachBlurHandler(newItem);
        }

        function removeLanguage() {
            const container = document.getElementById('languages-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateLanguageRemoveButton();
        }

        function updateLanguageRemoveButton() {
            const container = document.getElementById('languages-container');
            const btn = document.getElementById('btn-remove-language');
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        function updateRemoveButton(type) {
            const container = document.getElementById(type + '-container');
            const btn = document.getElementById('btn-remove-' + type);
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        function attachBlurHandler(element) {
            element.querySelectorAll('.editable-field').forEach(field => {
                field.addEventListener('blur', function() {
                    const text = this.innerText.trim();
                    if (text === '') {
                        this.innerHTML = '';
                    }
                });
            });
        }

        // Initialize remove buttons
        updateSkillRemoveButton();
        updateLanguageRemoveButton();

        const STORAGE_KEY = 'resume-shared-fields-v1';

        function normalizePlaceholder(value) {
            const source = (value || '').trim().toLowerCase();
            const map = {
                'фамилия': 'last_name',
                'имя': 'first_name',
                'отчество': 'middle_name',
                'должность': 'position',
                'email': 'email',
                'телефон': 'phone',
                'город': 'city',
                'локация': 'city',
                'о себе': 'about',
                'расскажите о себе': 'about',
                'компания': 'company',
                'название компании': 'company',
                'период': 'period',
                'период работы': 'period',
                'описание': 'description',
                'описание обязанностей': 'description',
                'степень': 'education_degree',
                'степень / специальность': 'education_degree',
                'год': 'education_year',
                'год окончания': 'education_year',
                'учебное заведение': 'education_place',
                'ваши интересы': 'additional',
            };
            return map[source] || source;
        }

        function resolveGroup(field) {
            if (field.closest('#experience-container')) return 'experience';
            if (field.closest('#education-container')) return 'education';
            return 'general';
        }

        function buildFieldKey(field) {
            const group = resolveGroup(field);
            const normalized = normalizePlaceholder(field.getAttribute('data-placeholder') || 'field');
            const same = Array.from(document.querySelectorAll('.editable-field')).filter((item) => {
                return resolveGroup(item) === group && normalizePlaceholder(item.getAttribute('data-placeholder') || 'field') === normalized;
            });
            return `${group}::${normalized}::${same.indexOf(field)}`;
        }

        function saveFields() {
            const data = {};
            document.querySelectorAll('.editable-field').forEach(field => {
                const value = field.innerText.trim();
                if (value) {
                    data[buildFieldKey(field)] = value;
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function restoreFields() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            let data = {};
            try {
                data = JSON.parse(raw);
            } catch {
                return;
            }
            document.querySelectorAll('.editable-field').forEach(field => {
                const value = data[buildFieldKey(field)];
                if (typeof value === 'string' && value.length > 0) {
                    field.innerText = value;
                }
            });
        }

        document.addEventListener('input', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                saveFields();
            }
        });
        document.addEventListener('blur', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                saveFields();
            }
        }, true);

        function clearAllFields() {
            document.querySelectorAll('.editable-field').forEach((field) => {
                field.innerHTML = '';
            });
            localStorage.removeItem(STORAGE_KEY);
        }

        restoreFields();
    </script>
</body>
</html>
