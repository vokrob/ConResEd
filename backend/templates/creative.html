<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резюме</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Arial', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .resume-container {
            max-width: 900px;
            margin: 0 auto;
            background: #111;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }

        .resume-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff, #06ffa5, #ffbe0b, #ff006e);
            background-size: 300% 100%;
            animation: gradient 5s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            padding: 60px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,0,110,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-start;
            gap: 40px;
        }

        .avatar-placeholder {
            width: 140px;
            height: 180px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,0,110,0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #888;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-wrapper {
            margin-bottom: 20px;
            flex: 1;
        }

        .greeting {
            font-size: 14px;
            color: #ff006e;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .name {
            font-size: 38px;
            font-weight: 800;
            background: none;
            -webkit-text-fill-color: #111;
            color: #111;
            line-height: 1.1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 24px;
            color: #8338ec;
            font-weight: 300;
            margin-top: 10px;
        }

        .name .editable-field {
            min-width: 120px;
            padding: 6px 8px;
            font-size: 0.8em;
        }

        .tagline {
            font-size: 18px;
            color: #888;
            margin-top: 20px;
            font-style: italic;
            max-width: 500px;
        }

        .stats-row {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #ff006e;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .content {
            padding: 60px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ff006e;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, #ff006e, transparent);
        }

        .editable-field {
            min-height: 20px;
            padding: 10px;
            border: 1px dashed transparent;
            border-radius: 8px;
            transition: all 0.2s;
            color: #ccc;
        }

        .editable-field:hover {
            border-color: #ff006e;
            background: rgba(255,0,110,0.05);
        }

        .editable-field:focus {
            outline: none;
            border-color: #8338ec;
            background: rgba(131,56,236,0.05);
        }

        .editable-field:empty:before {
            content: attr(data-placeholder);
            color: #555;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .contact-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .experience-item {
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            border-radius: 15px;
            border-left: 4px solid #ff006e;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-title {
            font-weight: 700;
            color: #fff;
            font-size: 18px;
        }

        .item-date {
            color: #ff006e;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .item-company {
            color: #8338ec;
            font-size: 14px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .item-description {
            color: #999;
            font-size: 14px;
            line-height: 1.8;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .skill-item {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 13px;
            color: #ccc;
            border: 1px solid rgba(255,0,110,0.2);
        }

        .highlight-box {
            background: linear-gradient(135deg, rgba(255,0,110,0.1) 0%, rgba(131,56,236,0.1) 100%);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,0,110,0.2);
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                padding: 30px;
            }
            .header {
                padding: 30px;
            }
            .name {
                font-size: 36px;
            }
            .skills-grid {
                grid-template-columns: 1fr;
            }
        }

        .experience-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-add, .btn-remove {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add {
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            color: white;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,0,110,0.3);
        }

        .btn-remove {
            background: #333;
            color: #ff006e;
            border: 1px solid #ff006e;
        }

        .btn-remove:hover {
            background: #ff006e;
            color: white;
        }

        .btn-remove:disabled {
            background: #222;
            color: #555;
            border-color: #333;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .template-nav {
            max-width: 900px;
            margin: 0 auto 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .template-nav a {
            text-decoration: none;
            background: #ff006e;
            color: #fff;
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 6px;
        }

        .template-nav button {
            border: none;
            background: #c0392b;
            color: #fff;
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .resume-container {
                background: white;
                border-radius: 0;
            }
            .header {
                background: #f5f5f5;
            }
            .experience-item {
                background: #f9f9f9;
                border-left-color: #333;
            }
            .editable-field {
                border: none;
                color: #333;
            }
            .experience-controls {
                display: none;
            }
        }

        body {
            background: #fff;
            padding: 16px;
        }

        .resume-container,
        .header,
        .experience-item,
        .skill-item,
        .highlight-box {
            background: #fff !important;
            color: #111 !important;
        }

        .resume-container {
            max-width: 210mm;
            min-height: 297mm;
            border-radius: 0;
        }

        .template-nav {
            max-width: 210mm;
        }

        .editable-field {
            color: #111;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .fio-field {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .section, .experience-item {
            break-inside: avoid-page;
            page-break-inside: avoid;
        }
        .print-priority-high { break-inside: avoid-page; page-break-inside: avoid; }
        .print-priority-medium { break-inside: avoid-page; page-break-inside: avoid; }
        .print-priority-low { break-inside: auto; page-break-inside: auto; }

        .item-remove-btn {
            margin-top: 8px;
            border: none;
            background: #f3f4f6;
            color: #7f1d1d;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        @page {
            size: A4;
            margin: 10mm;
        }

        @media print {
            .template-nav, .experience-controls, .item-remove-btn {
                display: none !important;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 12px 10px;
            }

            .template-nav {
                max-width: 100%;
                position: sticky;
                top: 0;
                z-index: 50;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(10px);
                padding: 10px 0;
                margin: 0 0 10px;
            }

            .template-nav a,
            .template-nav button {
                font-size: 12px;
                padding: 8px 10px;
                border-radius: 10px;
            }

            .resume-container {
                max-width: 100%;
                padding: 18px 16px;
                border-radius: 16px;
            }

            .header-content {
                display: grid;
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .stats-row {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
            }

            .name {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <nav class="template-nav">
        <a href="http://localhost:8080/">Главная</a>
        <a href="http://localhost:8080/templates/classic.html">Классический</a>
        <a href="http://localhost:8080/templates/modern.html">Современный</a>
        <a href="http://localhost:8080/templates/creative.html">Креативный</a>
        <a href="http://localhost:8080/templates/professional.html">Профессиональный</a>
        <button type="button" onclick="saveToCabinet()" style="background:#166534;">Сохранить в кабинет</button>
        <button type="button" onclick="exportToPdf()" style="background:#1d4ed8;">Скачать PDF (A4)</button>
        <button type="button" onclick="clearAllFields()">Очистить все поля</button>
    </nav>
    <div class="resume-container">
        <header class="header print-priority-high">
            <div class="header-content">
                <div class="avatar-placeholder">📷 Фото</div>
                <div>
                    <div class="name-wrapper">
                        <div class="name">
                            <span class="editable-field" data-placeholder="Фамилия" contenteditable="true"></span>
                            <span class="editable-field" data-placeholder="Имя" contenteditable="true"></span>
                            <span class="editable-field" data-placeholder="Отчество" contenteditable="true"></span>
                        </div>
                        <div class="title editable-field" data-placeholder="Должность" contenteditable="true"></div>
                    </div>
                    <div class="tagline editable-field" data-placeholder="Ваш слоган или краткое описание" contenteditable="true"></div>
                </div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">Лет опыта</div>
                        <div class="stat-number editable-field" data-placeholder="" contenteditable="true"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Проектов</div>
                        <div class="stat-number editable-field" data-placeholder="" contenteditable="true"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Клиентов</div>
                        <div class="stat-number editable-field" data-placeholder="" contenteditable="true"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="content">
            <div class="left-column">
                <div class="section print-priority-high">
                    <h2 class="section-title">Связаться</h2>
                    <div class="contact-list">
                        <div class="contact-item">
                            <div class="contact-icon">@</div>
                            <div class="editable-field" data-placeholder="Email" contenteditable="true"></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">📱</div>
                            <div class="editable-field" data-placeholder="Телефон" contenteditable="true"></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">🌐</div>
                            <div class="editable-field" data-placeholder="Сайт" contenteditable="true"></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">in</div>
                            <div class="editable-field" data-placeholder="hh.ru" contenteditable="true"></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">📍</div>
                            <div class="editable-field" data-placeholder="Локация" contenteditable="true"></div>
                        </div>
                    </div>
                </div>

                <div class="section print-priority-medium">
                    <h2 class="section-title">Навыки</h2>
                    <div id="skills-container" class="skills-grid">
                        <div class="skill-item editable-field" data-placeholder="Навык" contenteditable="true"></div>
                        <div class="skill-item editable-field" data-placeholder="Навык" contenteditable="true"></div>
                        <div class="skill-item editable-field" data-placeholder="Навык" contenteditable="true"></div>
                        <div class="skill-item editable-field" data-placeholder="Навык" contenteditable="true"></div>
                    </div>
                    <div class="experience-controls">
                        <button class="btn-add" onclick="addSkill()">+ Добавить навык</button>
                        <button class="btn-remove" id="btn-remove-skill" onclick="removeSkill()" disabled>- Удалить</button>
                    </div>
                </div>

                <div class="section print-priority-low">
                    <h2 class="section-title">Дополнительно</h2>
                    <div class="highlight-box">
                        <div class="editable-field" data-placeholder="" contenteditable="true"></div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="section print-priority-high">
                    <h2 class="section-title">О себе</h2>
                    <div class="highlight-box">
                        <div class="editable-field" data-placeholder="Расскажите свою историю" contenteditable="true"></div>
                    </div>
                </div>

                <div class="section print-priority-medium">
                    <h2 class="section-title">Опыт</h2>
                    <div id="experience-container">
                        <div class="experience-item">
                            <div class="item-header">
                                <span class="item-title editable-field" data-placeholder="Должность" contenteditable="true"></span>
                                <span class="item-date editable-field" data-placeholder="Период" contenteditable="true"></span>
                            </div>
                            <div class="item-company editable-field" data-placeholder="Компания" contenteditable="true"></div>
                            <div class="item-description editable-field" data-placeholder="Описание" contenteditable="true"></div>
                        </div>
                    </div>
                    <div class="experience-controls">
                        <button class="btn-add" onclick="addExperience()">+ Добавить место работы</button>
                        <button class="btn-remove" id="btn-remove-experience" onclick="removeExperience()" disabled>- Удалить последнее</button>
                    </div>
                </div>

                <div class="section print-priority-medium">
                    <h2 class="section-title">Образование</h2>
                    <div id="education-container">
                        <div class="experience-item">
                            <div class="item-header">
                                <span class="item-title editable-field" data-placeholder="Степень" contenteditable="true"></span>
                                <span class="item-date editable-field" data-placeholder="Год" contenteditable="true"></span>
                            </div>
                            <div class="item-company editable-field" data-placeholder="Учебное заведение" contenteditable="true"></div>
                        </div>
                    </div>
                    <div class="experience-controls">
                        <button class="btn-add" onclick="addEducation()">+ Добавить образование</button>
                        <button class="btn-remove" id="btn-remove-education" onclick="removeEducation()" disabled>- Удалить последнее</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Функция для очистки пустых полей при потере фокуса
        document.querySelectorAll('.editable-field').forEach(field => {
            field.addEventListener('blur', function() {
                const text = this.innerText.trim();
                if (text === '') {
                    this.innerHTML = '';
                }
            });
        });

        // Опыт работы
        function addExperience() {
            const container = document.getElementById('experience-container');
            const newItem = document.createElement('div');
            newItem.className = 'experience-item';
            newItem.innerHTML = `
                <div class="item-header">
                    <span class="item-title editable-field" data-placeholder="Должность" contenteditable="true"></span>
                    <span class="item-date editable-field" data-placeholder="Период" contenteditable="true"></span>
                </div>
                <div class="item-company editable-field" data-placeholder="Компания" contenteditable="true"></div>
                <div class="item-description editable-field" data-placeholder="Описание" contenteditable="true"></div>
            `;
            container.appendChild(newItem);
            updateRemoveButton('experience');
            attachBlurHandler(newItem);
        }

        function removeExperience() {
            const container = document.getElementById('experience-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateRemoveButton('experience');
            saveStructure();
        }

        // Образование
        function addEducation() {
            const container = document.getElementById('education-container');
            const newItem = document.createElement('div');
            newItem.className = 'experience-item';
            newItem.innerHTML = `
                <div class="item-header">
                    <span class="item-title editable-field" data-placeholder="Степень" contenteditable="true"></span>
                    <span class="item-date editable-field" data-placeholder="Год" contenteditable="true"></span>
                </div>
                <div class="item-company editable-field" data-placeholder="Учебное заведение" contenteditable="true"></div>
            `;
            container.appendChild(newItem);
            updateRemoveButton('education');
            attachBlurHandler(newItem);
        }

        function removeEducation() {
            const container = document.getElementById('education-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateRemoveButton('education');
            saveStructure();
        }

        // Навыки
        function addSkill() {
            const container = document.getElementById('skills-container');
            const newItem = document.createElement('div');
            newItem.className = 'skill-item editable-field';
            newItem.setAttribute('data-placeholder', 'Навык');
            newItem.setAttribute('contenteditable', 'true');
            container.appendChild(newItem);
            updateSkillRemoveButton();
            // Attach blur handler directly to the new element
            newItem.addEventListener('blur', function() {
                const text = this.innerText.trim();
                if (text === '') {
                    this.innerHTML = '';
                }
            });
        }

        function removeSkill() {
            const container = document.getElementById('skills-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
            }
            updateSkillRemoveButton();
        }

        function updateSkillRemoveButton() {
            const container = document.getElementById('skills-container');
            const btn = document.getElementById('btn-remove-skill');
            btn.disabled = container.children.length <= 1;
        }

        function updateRemoveButton(type) {
            const container = document.getElementById(type + '-container');
            const btn = document.getElementById('btn-remove-' + type);
            if (container && btn) {
                btn.disabled = container.children.length <= 1;
            }
        }

        function attachBlurHandler(element) {
            if (element.classList && element.classList.contains('editable-field')) {
                element.addEventListener('blur', function() {
                    const text = this.innerText.trim();
                    if (text === '') {
                        this.innerHTML = '';
                    }
                });
            } else {
                element.querySelectorAll('.editable-field').forEach(field => {
                    field.addEventListener('blur', function() {
                        const text = this.innerText.trim();
                        if (text === '') {
                            this.innerHTML = '';
                        }
                    });
                });
            }
        }

        // Initialize skill remove button state
        updateSkillRemoveButton();

        const STORAGE_KEY = 'resume-shared-fields-v1';

        function normalizePlaceholder(value) {
            const source = (value || '').trim().toLowerCase();
            const map = {
                'фамилия': 'last_name',
                'имя': 'first_name',
                'отчество': 'middle_name',
                'должность': 'position',
                'email': 'email',
                'телефон': 'phone',
                'город': 'city',
                'локация': 'city',
                'о себе': 'about',
                'расскажите свою историю': 'about',
                'компания': 'company',
                'название компании': 'company',
                'период': 'period',
                'период работы': 'period',
                'описание': 'description',
                'описание обязанностей': 'description',
                'степень': 'education_degree',
                'степень / специальность': 'education_degree',
                'год': 'education_year',
                'год окончания': 'education_year',
                'учебное заведение': 'education_place',
                'перечислите инструменты': 'additional',
            };
            return map[source] || source;
        }

        function resolveGroup(field) {
            if (field.closest('#experience-container')) return 'experience';
            if (field.closest('#education-container')) return 'education';
            return 'general';
        }

        function buildFieldKey(field) {
            const group = resolveGroup(field);
            const normalized = normalizePlaceholder(field.getAttribute('data-placeholder') || 'field');
            const same = Array.from(document.querySelectorAll('.editable-field')).filter((item) => {
                return resolveGroup(item) === group && normalizePlaceholder(item.getAttribute('data-placeholder') || 'field') === normalized;
            });
            return `${group}::${normalized}::${same.indexOf(field)}`;
        }

        function saveFields() {
            const data = {};
            document.querySelectorAll('.editable-field').forEach(field => {
                const value = field.innerText.trim();
                if (value) {
                    data[buildFieldKey(field)] = value;
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function restoreFields() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            let data = {};
            try {
                data = JSON.parse(raw);
            } catch {
                return;
            }
            document.querySelectorAll('.editable-field').forEach(field => {
                const value = data[buildFieldKey(field)];
                if (typeof value === 'string' && value.length > 0) {
                    field.innerText = value;
                }
            });
        }

        document.addEventListener('input', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                saveFields();
            }
        });
        document.addEventListener('blur', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                saveFields();
            }
        }, true);

        function clearAllFields() {
            document.querySelectorAll('.editable-field').forEach((field) => {
                field.innerHTML = '';
            });
            localStorage.removeItem(STORAGE_KEY);
        }

        function exportToPdf() {
            window.print();
        }

        async function saveToCabinet() {
            const params = new URLSearchParams(window.location.search);
            const resumeId = params.get('resumeId');
            const updateExisting = resumeId ? window.confirm('Обновить текущее сохраненное резюме?\nНажмите Отмена, чтобы сохранить как новое.') : false;
            const title = window.prompt('Название шаблона', 'Мое резюме (creative)') || '';
            if (!title.trim()) return;
            saveFields();
            saveStructure();
            const payload = {
                fields: JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'),
                structure: JSON.parse(localStorage.getItem(STRUCTURE_STORAGE_KEY) || '{}')
            };
            const url = updateExisting ? `/api/resumes/${resumeId}` : '/api/resumes';
            const method = updateExisting ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ template_id: 'creative', title, payload })
            });
            const result = await response.json().catch(() => ({}));
            if (response.ok) {
                if (!updateExisting && result?.item?.id) {
                    params.set('resumeId', String(result.item.id));
                    window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
                }
                alert(updateExisting ? 'Изменения сохранены' : 'Шаблон сохранен в личный кабинет');
            } else {
                alert(result?.error || 'Не удалось сохранить шаблон');
            }
        }

        function applyInputConstraints() {
            document.querySelectorAll('.editable-field').forEach((field) => {
                const ph = (field.getAttribute('data-placeholder') || '').toLowerCase();
                if (['фамилия', 'имя', 'отчество'].includes(ph)) {
                    field.classList.add('fio-field');
                    field.dataset.singleLine = 'true';
                    field.dataset.maxLine = '30';
                    return;
                }
                if (!field.dataset.maxLine) {
                    field.dataset.maxLine = ph.includes('навык') ? '160' : '80';
                }
            });
        }

        function clampContent(field) {
            const singleLine = field.dataset.singleLine === 'true';
            const maxLine = parseInt(field.dataset.maxLine || '80', 10);
            let value = (field.innerText || '').replace(/\u00A0/g, ' ');
            if (singleLine) {
                value = value.replace(/[\r\n]+/g, ' ');
                const normalized = value.slice(0, maxLine);
                if (normalized !== field.innerText) field.innerText = normalized;
                return;
            }
            if (!/[\r\n]/.test(value)) {
                return;
            }
            const lines = value.split(/\r?\n/).map((line) => line.slice(0, maxLine));
            const normalized = lines.join('\n');
            if (normalized !== field.innerText) field.innerText = normalized;
        }

        function getItemSelector(container) {
            const first = container && container.firstElementChild;
            if (!first) return null;
            return '.' + Array.from(first.classList)[0];
        }

        function ensureItemRemoveButtons() {
            ['experience-container', 'education-container'].forEach((id) => {
                const container = document.getElementById(id);
                if (!container) return;
                const itemSelector = getItemSelector(container);
                if (!itemSelector) return;
                container.querySelectorAll(itemSelector).forEach((item) => {
                    if (item.querySelector('.item-remove-btn')) return;
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'item-remove-btn';
                    btn.textContent = 'Удалить этот блок';
                    btn.onclick = () => {
                        if (container.querySelectorAll(itemSelector).length > 1) {
                            item.remove();
                            saveFields();
                            saveStructure();
                        }
                    };
                    item.appendChild(btn);
                });
            });
        }

        const STRUCTURE_STORAGE_KEY = 'resume-shared-structure-v1';
        const originalAddExperience = addExperience;
        addExperience = function() { originalAddExperience(); ensureItemRemoveButtons(); saveStructure(); };
        const originalAddEducation = addEducation;
        addEducation = function() { originalAddEducation(); ensureItemRemoveButtons(); saveStructure(); };

        function saveStructure() {
            localStorage.setItem(STRUCTURE_STORAGE_KEY, JSON.stringify({
                experience: document.getElementById('experience-container')?.children.length || 1,
                education: document.getElementById('education-container')?.children.length || 1,
            }));
        }

        function restoreStructure() {
            const raw = localStorage.getItem(STRUCTURE_STORAGE_KEY);
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                while ((document.getElementById('experience-container')?.children.length || 0) < Math.max(1, Number(data.experience) || 1)) addExperience();
                while ((document.getElementById('education-container')?.children.length || 0) < Math.max(1, Number(data.education) || 1)) addEducation();
            } catch {}
        }

        document.addEventListener('input', (event) => {
            if (event.target.classList && event.target.classList.contains('editable-field')) {
                clampContent(event.target);
                saveFields();
                saveStructure();
            }
        });

        async function initPageData() {
            const params = new URLSearchParams(window.location.search);
            const resumeId = params.get('resumeId');
            const blank = params.get('blank') === '1';

            if (resumeId) {
                try {
                    const response = await fetch(`/api/resumes/${resumeId}`, { credentials: 'include' });
                    if (response.ok) {
                        const data = await response.json();
                        const payload = data?.item?.payload || {};
                        if (payload.structure) {
                            localStorage.setItem(STRUCTURE_STORAGE_KEY, JSON.stringify(payload.structure));
                        }
                        if (payload.fields) {
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload.fields));
                        }
                    }
                } catch {}
                restoreStructure();
                restoreFields();
                return;
            }

            if (blank) {
                return;
            }

            restoreStructure();
            restoreFields();
        }

        applyInputConstraints();
        ensureItemRemoveButtons();
        initPageData();
    </script>
</body>
</html>
