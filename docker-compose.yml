services:
  db:
    image: postgres:16-alpine
    container_name: conresed-db
    environment:
      POSTGRES_DB: conresed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conresed"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: conresed-backend
    environment:
      DB_NAME: conresed
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: conresed-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
